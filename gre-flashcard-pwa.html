<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- PWA Manifest -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22GRE%208000%20%E5%88%B7%E8%AF%8D%E5%99%A8%22%2C%22short_name%22%3A%22GRE%208000%22%2C%22description%22%3A%22GRE%208000%20%E6%A0%B8%E5%BF%83%E8%AF%8D%E6%B1%87%E5%88%B7%E8%AF%8D%E5%99%A8%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f0f0f%22%2C%22theme_color%22%3A%22%230f0f0f%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%2520viewBox%3D%270%25200%2520512%2520512%27%253E%253Crect%2520fill%3D%27%231a1a2e%27%2520rx%3D%27100%27%2520width%3D%27512%27%2520height%3D%27512%27%2F%253E%253Ctext%2520x%3D%27256%27%2520y%3D%27240%27%2520text-anchor%3D%27middle%27%2520font-size%3D%27180%27%2520font-weight%3D%27800%27%2520fill%3D%27white%27%253EGRE%253C%2Ftext%253E%253Ctext%2520x%3D%27256%27%2520y%3D%27350%27%2520text-anchor%3D%27middle%27%2520font-size%3D%2780%27%2520font-weight%3D%27600%27%2520fill%3D%27%23e94560%27%253E8000%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%2C%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%2520viewBox%3D%270%25200%2520192%2520192%27%253E%253Crect%2520fill%3D%27%231a1a2e%27%2520rx%3D%2740%27%2520width%3D%27192%27%2520height%3D%27192%27%2F%253E%253Ctext%2520x%3D%2796%27%2520y%3D%2790%27%2520text-anchor%3D%27middle%27%2520font-size%3D%2768%27%2520font-weight%3D%27800%27%2520fill%3D%27white%27%253EG%253C%2Ftext%253E%253Ctext%2520x%3D%2796%27%2520y%3D%27132%27%2520text-anchor%3D%27middle%27%2520font-size%3D%2730%27%2520font-weight%3D%27600%27%2520fill%3D%27%23e94560%27%253E8K%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect fill='%231a1a2e' rx='100' width='512' height='512'/><text x='256' y='240' text-anchor='middle' font-size='180' font-weight='800' fill='white'>GRE</text><text x='256' y='350' text-anchor='middle' font-size='80' font-weight='600' fill='%23e94560'>8000</text></svg>">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --dim: #888;
    --green: #4ecca3;
    --orange: #f5a623;
    --red: #e94560;
    --r: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding-top: constant(safe-area-inset-top);
    padding-top: env(safe-area-inset-top);
    padding-bottom: constant(safe-area-inset-bottom);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* NAV */
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
    background:var(--card); border-bottom:1px solid #333;
    position:relative; z-index:100;
  }
  .nav-title { font-size:18px; font-weight:700; letter-spacing:1px; }
  .nav-title span { color:var(--accent); }
  .nav-btn {
    background:none; border:1px solid #444; color:var(--text);
    padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer;
    transition:all .2s;
  }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .nav-right { display:flex; gap:8px; align-items:center; }

  /* VIEWS */
  .view { display:none; height:calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom)); height:calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)); overflow-y:auto; }
  .view.active { display:flex; flex-direction:column; }

  /* HOME */
  #home { padding:20px 16px; gap:16px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  .stats-row { display:flex; gap:12px; }
  .stat-card {
    flex:1; background:var(--card); border-radius:var(--r);
    padding:16px; text-align:center;
  }
  .stat-num { font-size:28px; font-weight:800; }
  .stat-num.green { color:var(--green); }
  .stat-num.orange { color:var(--orange); }
  .stat-num.red { color:var(--red); }
  .stat-label { font-size:12px; color:var(--dim); margin-top:4px; }

  .progress-bar-bg { width:100%; height:8px; background:#333; border-radius:4px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--accent)); border-radius:4px; transition:width .5s ease; }
  .progress-text { font-size:13px; color:var(--dim); text-align:center; margin-top:6px; }

  .config-section { background:var(--card); border-radius:var(--r); padding:16px; }
  .config-section h3 { font-size:15px; margin-bottom:12px; }
  .config-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
  .config-row label { font-size:14px; color:var(--dim); min-width:80px; }
  .config-row input, .config-row select {
    background:#111; border:1px solid #444; color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:14px; flex:1; min-width:80px;
  }

  .big-btn {
    width:100%; padding:16px; border:none; border-radius:var(--r);
    font-size:18px; font-weight:700; cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; letter-spacing:2px; transition:transform .15s;
  }
  .big-btn:active { transform:scale(0.97); }
  .big-btn.secondary { background:var(--card); border:1px solid #444; font-size:15px; letter-spacing:0; }

  /* STUDY */
  #study { align-items:center; justify-content:center; padding:20px 16px; position:relative; }
  .study-top {
    display:flex; flex-direction:column; align-items:flex-start; padding:10px 16px;
    padding-top: calc(10px + env(safe-area-inset-top));
    background:var(--card); border-bottom:1px solid #333;
  }
  .study-top .study-progress { width:100%; display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .study-back { font-size:12px; padding:4px 10px; align-self:flex-start; }

  .study-progress .bar { flex:1; height:4px; background:#333; border-radius:2px; }
  .study-progress .bar-fill { height:100%; background:var(--green); border-radius:2px; transition:width .3s; }
  .study-progress .counter { font-size:13px; color:var(--dim); white-space:nowrap; }

  .word-card {
    width:100%; max-width:420px; background:var(--card);
    border-radius:20px; padding:40px 24px; text-align:center;
    position:relative; transition:transform .3s, opacity .3s;
    touch-action:pan-y;
  }
  .word-card.slide-left { transform:translateX(-120%); opacity:0; }
  .word-card.slide-right { transform:translateX(120%); opacity:0; }

  .word-text { font-size:36px; font-weight:800; letter-spacing:1px; margin-bottom:8px; }
  .word-phonetic {
    font-size:16px; color:var(--dim); margin-bottom:24px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .sound-btn {
    background:none; border:none; color:var(--accent); cursor:pointer;
    font-size:20px; padding:4px; display:inline-flex; align-items:center;
  }
  .sound-btn:active { transform:scale(1.2); }

  .word-def {
    font-size:18px; line-height:1.6; color:var(--text);
    min-height:60px; padding:16px;
    background:#111; border-radius:12px;
    opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .word-def.show { opacity:1; pointer-events:auto; }

  .word-actions { display:flex; gap:12px; margin-top:24px; width:100%; max-width:420px; }
  .act-btn {
    flex:1; padding:14px 0; border:none; border-radius:12px;
    font-size:15px; font-weight:600; cursor:pointer; transition:transform .1s;
  }
  .act-btn:active { transform:scale(0.95); }
  .act-btn.know { background:var(--green); color:#000; }
  .act-btn.fuzzy { background:var(--orange); color:#000; }
  .act-btn.no { background:var(--red); color:#fff; }
  .act-btn.show-def { background:#333; color:var(--text); }

  .shortcut-hint { margin-top:16px; font-size:12px; color:#555; text-align:center; }
  @media (max-width:640px) { .shortcut-hint { display:none; } }

  /* RESULT */
  #result { align-items:center; justify-content:center; padding:20px 16px; gap:20px; }
  .result-emoji { font-size:64px; }
  .result-title { font-size:24px; font-weight:700; }
  .result-stats { display:flex; gap:16px; }
  .result-stat { text-align:center; }
  .result-stat .num { font-size:32px; font-weight:800; }
  .result-stat .label { font-size:13px; color:var(--dim); }

  .mistake-list {
    width:100%; max-width:480px; background:var(--card); border-radius:var(--r);
    padding:16px; max-height:40vh; overflow-y:auto;
  }
  .mistake-list h4 { margin-bottom:10px; color:var(--red); }
  .mistake-item { padding:8px 0; border-bottom:1px solid #333; font-size:14px; }
  .mistake-item:last-child { border:none; }
  .mistake-word { font-weight:700; font-size:16px; }
  .mistake-def { color:var(--dim); margin-top:2px; }

  /* LIST VIEW */
  #listview { padding:0; }
  .list-toolbar {
    padding:12px 16px; background:var(--card); border-bottom:1px solid #333;
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    position:sticky; top:0; z-index:10;
  }
  .list-toolbar input {
    flex:1; min-width:120px; background:#111; border:1px solid #444;
    color:var(--text); padding:8px 12px; border-radius:8px; font-size:14px;
  }
  .filter-btn {
    padding:6px 12px; border-radius:8px; border:1px solid #444;
    background:none; color:var(--dim); font-size:13px; cursor:pointer;
  }
  .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(233,69,96,0.1); }
  .word-list { flex:1; overflow-y:auto; padding:8px 16px; }
  .list-item {
    display:flex; align-items:center; padding:12px 0; border-bottom:1px solid #222; gap:12px;
  }
  .list-item .idx { font-size:12px; color:#555; min-width:36px; }
  .list-item .w { font-weight:600; font-size:15px; min-width:120px; cursor:pointer; }
  .list-item .w:active { color:var(--accent); }
  .list-item .d { font-size:13px; color:var(--dim); flex:1; }
  .list-item .badge { font-size:11px; padding:2px 8px; border-radius:4px; white-space:nowrap; }
  .badge-know { background:rgba(78,204,163,0.2); color:var(--green); }
  .badge-fuzzy { background:rgba(245,166,35,0.2); color:var(--orange); }
  .badge-no { background:rgba(233,69,96,0.2); color:var(--red); }
  .badge-new { background:rgba(255,255,255,0.05); color:#555; }
  .list-empty { text-align:center; padding:40px; color:#555; }

  /* MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border-radius:var(--r); padding:24px; width:100%; max-width:400px; }
  .modal h3 { margin-bottom:16px; }
  .modal .config-row { margin-bottom:12px; }
  .modal-actions { display:flex; gap:10px; margin-top:16px; }
  .modal-actions button { flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; font-size:14px; }
  .modal-actions .save { background:var(--accent); color:#fff; }
  .modal-actions .cancel { background:#333; color:var(--text); }
  .danger-zone { margin-top:20px; padding-top:16px; border-top:1px solid #333; }
  .danger-btn { background:none; border:1px solid var(--red); color:var(--red); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; width:100%; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">GRE <span>8000</span></div>
  <div class="nav-right">
    <button class="nav-btn" onclick="showView('listview')">&#128214; 词表</button>
    <button class="nav-btn" onclick="openSettings()">&#9881;&#65039;</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="view active">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num green" id="s-known">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat-card"><div class="stat-num orange" id="s-fuzzy">0</div><div class="stat-label">模糊</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-unknown">0</div><div class="stat-label">不认识</div></div>
  </div>
  <div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="p-fill"></div></div>
    <div class="progress-text" id="p-text">0 / 7744</div>
  </div>
  <div class="config-section">
    <h3>&#128203; 今日计划</h3>
    <div class="config-row">
      <label>每批数量</label>
      <input type="number" id="batch-size" value="50" min="10" max="500" step="10">
    </div>
    <div class="config-row">
      <label>学习模式</label>
      <select id="study-mode">
        <option value="new">新词优先</option>
        <option value="review">复习模糊/不认识</option>
        <option value="all-review">全部复习</option>
        <option value="random">随机抽查</option>
      </select>
    </div>
  </div>
  <button class="big-btn" onclick="startStudy()">&#128640; 开始刷词</button>
  <button class="big-btn secondary" onclick="showView('listview')">&#128214; 浏览全部词表</button>
</div>

<!-- STUDY -->
<div id="study" class="view">
  <div class="study-top">
    <div class="study-progress">
      <div class="bar"><div class="bar-fill" id="study-bar"></div></div>
      <div class="counter" id="study-counter">0/0</div>
    </div>
    <button class="nav-btn study-back" onclick="quitStudy()">&#8592; 返回</button>
  </div>
  <div class="word-card" id="word-card">
    <div class="word-text" id="w-word">-</div>
    <div class="word-phonetic">
      <span id="w-phonetic">/-/</span>
      <button class="sound-btn" onclick="speak()" title="播放发音">&#128266;</button>
    </div>
    <div class="word-def" id="w-def">-</div>
  </div>
  <div class="word-actions" id="w-actions">
    <button class="act-btn show-def" id="btn-show" onclick="showDef()">&#128064; 翻转看释义</button>
  </div>
  <div class="word-actions" id="w-rate" style="display:none;">
    <button class="act-btn know" onclick="rate(2)">&#10004; 认识</button>
    <button class="act-btn fuzzy" onclick="rate(1)">&#129300; 模糊</button>
    <button class="act-btn no" onclick="rate(0)">&#10060; 不认识</button>
  </div>
  <div class="shortcut-hint">键盘快捷键：Space 翻转 ｜ 1 认识 ｜ 2 模糊 ｜ 3 不认识 ｜ S 发音</div>
</div>

<!-- RESULT -->
<div id="result" class="view">
  <div class="result-emoji" id="r-emoji">&#127881;</div>
  <div class="result-title" id="r-title">本轮完成！</div>
  <div class="result-stats">
    <div class="result-stat"><div class="num green" id="r-know">0</div><div class="label">认识</div></div>
    <div class="result-stat"><div class="num orange" id="r-fuzzy">0</div><div class="label">模糊</div></div>
    <div class="result-stat"><div class="num red" id="r-no">0</div><div class="label">不认识</div></div>
  </div>
  <div class="mistake-list" id="r-mistakes" style="display:none;">
    <h4>&#128221; 需复习的词</h4>
    <div id="r-mistake-items"></div>
  </div>
  <button class="big-btn" onclick="startStudy()">继续下一批</button>
  <button class="big-btn secondary" onclick="showView('home')">返回首页</button>
</div>

<!-- LIST VIEW -->
<div id="listview" class="view">
  <div class="list-toolbar">
    <input type="text" id="list-search" placeholder="搜索单词..." oninput="filterList()">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" data-filter="new" onclick="setFilter('new',this)">未学</button>
    <button class="filter-btn" data-filter="know" onclick="setFilter('know',this)">&#10004;</button>
    <button class="filter-btn" data-filter="fuzzy" onclick="setFilter('fuzzy',this)">&#129300;</button>
    <button class="filter-btn" data-filter="no" onclick="setFilter('no',this)">&#10060;</button>
    <button class="nav-btn" onclick="showView('home')">&#8592; 返回</button>
  </div>
  <div class="word-list" id="word-list"></div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal" style="position:relative;">
    <button onclick="closeSettings()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:24px;line-height:1;cursor:pointer;z-index:10;padding:4px;" title="关闭">&#10005;</button>
    <h3 style="margin-bottom:16px;">&#9881;&#65039; 设置</h3>
    <div class="config-row">
      <label>发音语速</label>
      <input type="range" id="set-rate" min="0.5" max="1.5" step="0.1" value="0.8" style="flex:1;" oninput="document.getElementById('set-rate-val').textContent=this.value+'x';settings.rate=parseFloat(this.value);saveS();">
      <span id="set-rate-val">0.8x</span>
    </div>
    <div class="config-row">
      <label>自动发音</label>
      <select id="set-auto-speak" onchange="settings.autoSpeak=this.value==='1';saveS();">
        <option value="1">开</option>
        <option value="0">关</option>
      </select>
    </div>
    <!-- Data Sync -->
    <div class="danger-zone" style="margin-top:16px;">
      <h4 style="color:var(--dim);font-size:13px;margin-bottom:10px;">&#128228; 数据同步</h4>
      <div style="display:flex;gap:8px;">
        <button class="danger-btn" style="flex:1;border-color:var(--green);color:var(--green);" onclick="exportData()">&#10515; 导出进度</button>
        <button class="danger-btn" id="btn-import" style="flex:1;border-color:#888;color:var(--text);margin-bottom:0;" onclick="triggerImport()">&#8629; 导入进度</button>
        <input type="file" id="import-file" accept=".json,.md" style="display:none;">
      </div>
      <p id="import-status" style="font-size:11px;color:var(--dim);margin-top:6px;text-align:center;min-height:16px;"></p>
      <p style="font-size:11px;color:#555;margin-top:2px;text-align:center;">导出 JSON 文件，可备份或通过 Obsidian/iCloud 同步多设备</p>
    </div>
  </div>
</div>

// ============ STATE ============
const SK = 'gre8k_v2';
let progress = {};
let settings = { rate: 0.8, autoSpeak: true };
let currentBatch = [];
let batchIdx = 0;
let batchResults = { know:0, fuzzy:0, no:0, mistakes:[] };
let defShown = false;
let currentFilter = 'all';

// ============ PERSISTENCE ============
function load() {
  try { const r = localStorage.getItem(SK); if(r) progress = JSON.parse(r); } catch(e){}
  try { const s = localStorage.getItem(SK+'_s'); if(s) settings = JSON.parse(s); } catch(e){}
}
function save() { localStorage.setItem(SK, JSON.stringify(progress)); }
function saveS() { localStorage.setItem(SK+'_s', JSON.stringify(settings)); }

// ============ STATS ============
function stats() {
  let k=0,f=0,u=0;
  for(const i in progress) { if(progress[i]===2)k++; else if(progress[i]===1)f++; else if(progress[i]===0)u++; }
  return {k,f,u,t:ALL_WORDS.length};
}
function updateHome() {
  const s = stats();
  document.getElementById('s-known').textContent = s.k;
  document.getElementById('s-fuzzy').textContent = s.f;
  document.getElementById('s-unknown').textContent = s.u;
  const pct = (s.k/s.t*100).toFixed(1);
  document.getElementById('p-fill').style.width = pct+'%';
  document.getElementById('p-text').textContent = `已掌握 ${s.k} / ${s.t}（学过 ${s.k+s.f+s.u}）`;
}

// ============ VIEWS ============
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='home') updateHome();
  if(id==='listview') renderList();
}

// ============ STUDY ============
function startStudy() {
  const size = parseInt(document.getElementById('batch-size').value)||50;
  const mode = document.getElementById('study-mode').value;
  currentBatch = buildBatch(mode, size);
  if(!currentBatch.length) { alert(mode==='new'?'没有新词了！试试复习模式':'没有需要学习的词'); return; }
  batchIdx = 0;
  batchResults = {know:0,fuzzy:0,no:0,mistakes:[]};
  showView('study');
  showWord();
}

function buildBatch(mode, size) {
  let pool=[];
  if(mode==='new') {
    for(let i=0;i<ALL_WORDS.length;i++) if(!(i in progress)) pool.push(i);
  } else if(mode==='review') {
    for(let i=0;i<ALL_WORDS.length;i++) if(progress[i]===0||progress[i]===1) pool.push(i);
    shuffle(pool);
  } else if(mode==='all-review') {
    for(let i=0;i<ALL_WORDS.length;i++) if(i in progress) pool.push(i);
    shuffle(pool);
  } else {
    pool = Array.from({length:ALL_WORDS.length},(_,i)=>i);
    shuffle(pool);
  }
  return pool.slice(0, size);
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }

function quitStudy() {
  if (batchIdx > 0) { save(); }
  currentBatch = []; batchIdx = 0;
  showView('home');
}

function showWord() {
  if(batchIdx>=currentBatch.length) { showResult(); return; }
  const wi = currentBatch[batchIdx];
  const w = ALL_WORDS[wi];
  const card = document.getElementById('word-card');
  card.classList.remove('slide-left','slide-right');
  document.getElementById('w-word').textContent = w.w;
  document.getElementById('w-phonetic').textContent = '/'+w.p+'/';
  document.getElementById('w-def').textContent = w.d;
  document.getElementById('w-def').classList.remove('show');
  document.getElementById('w-actions').style.display = 'flex';
  document.getElementById('w-rate').style.display = 'none';
  defShown = false;
  const pct = (batchIdx/currentBatch.length*100).toFixed(0);
  document.getElementById('study-bar').style.width = pct+'%';
  document.getElementById('study-counter').textContent = (batchIdx+1)+' / '+currentBatch.length;
  if(settings.autoSpeak) setTimeout(()=>speak(),200);
}

function showDef() {
  document.getElementById('w-def').classList.add('show');
  document.getElementById('w-actions').style.display = 'none';
  document.getElementById('w-rate').style.display = 'flex';
  defShown = true;
}

function rate(status) {
  const wi = currentBatch[batchIdx];
  progress[wi] = status;
  save();
  if(status===2) batchResults.know++;
  else if(status===1) { batchResults.fuzzy++; batchResults.mistakes.push(wi); }
  else { batchResults.no++; batchResults.mistakes.push(wi); }
  const card = document.getElementById('word-card');
  card.classList.add(status===2?'slide-right':'slide-left');
  setTimeout(()=>{ batchIdx++; showWord(); }, 250);
}

// ============ RESULT ============
function showResult() {
  showView('result');
  document.getElementById('r-know').textContent = batchResults.know;
  document.getElementById('r-fuzzy').textContent = batchResults.fuzzy;
  document.getElementById('r-no').textContent = batchResults.no;
  const total = batchResults.know+batchResults.fuzzy+batchResults.no;
  const ratio = total>0?(batchResults.know/total):0;
  document.getElementById('r-emoji').textContent = ratio>0.8?'\u{1F389}':ratio>0.5?'\u{1F4AA}':'\u{1F4DA}';
  document.getElementById('r-title').textContent = ratio>0.8?'太棒了！':ratio>0.5?'继续加油！':'多多复习！';
  const ml = document.getElementById('r-mistakes');
  const mi = document.getElementById('r-mistake-items');
  if(batchResults.mistakes.length>0) {
    ml.style.display='block';
    mi.innerHTML = batchResults.mistakes.map(wi=>{
      const w=ALL_WORDS[wi];
      return '<div class="mistake-item"><div class="mistake-word">'+w.w+' <span style="color:#888;font-weight:400;font-size:13px">/'+w.p+'/</span></div><div class="mistake-def">'+w.d+'</div></div>';
    }).join('');
  } else ml.style.display='none';
  updateHome();
}

// ============ SPEECH ============
function speak() {
  const word = document.getElementById('w-word').textContent;
  if(!word||word==='-') return;
  if('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang='en-US'; u.rate=settings.rate; u.pitch=1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang.startsWith('en')&&v.name.includes('Samantha'))
      || voices.find(v=>v.lang==='en-US')
      || voices.find(v=>v.lang.startsWith('en'));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }
}
if('speechSynthesis' in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }

// ============ LIST ============
let listTimer=null;
function renderList() { clearTimeout(listTimer); listTimer=setTimeout(_renderList,50); }
function _renderList() {
  const q = document.getElementById('list-search').value.toLowerCase();
  const c = document.getElementById('word-list');
  let html='', count=0, max=200;
  for(let i=0;i<ALL_WORDS.length&&count<max;i++) {
    const w=ALL_WORDS[i], s=progress[i];
    if(currentFilter==='new'&&s!==undefined) continue;
    if(currentFilter==='know'&&s!==2) continue;
    if(currentFilter==='fuzzy'&&s!==1) continue;
    if(currentFilter==='no'&&s!==0) continue;
    if(q&&!w.w.toLowerCase().includes(q)&&!w.d.includes(q)) continue;
    const badge = s===2?'<span class="badge badge-know">&#10004;</span>'
      :s===1?'<span class="badge badge-fuzzy">&#129300;</span>'
      :s===0?'<span class="badge badge-no">&#10060;</span>'
      :'<span class="badge badge-new">-</span>';
    html+='<div class="list-item"><span class="idx">'+(i+1)+'</span><span class="w" onclick="speakWord(\''+w.w+'\')" title="点击发音">'+w.w+' <span style="color:var(--dim);font-size:11px;font-weight:400;">/'+w.p+'/</span></span><span class="d">'+w.d+'</span>'+badge+'</div>';
    count++;
  }
  if(!html) html='<div class="list-empty">没有匹配的词</div>';
  if(count>=max) html+='<div class="list-empty">显示前200条，请搜索缩小范围</div>';
  c.innerHTML=html;
}
function filterList(){renderList();}
function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ============ SETTINGS ============
function openSettings() {
  document.getElementById('set-rate').value=settings.rate;
  document.getElementById('set-rate-val').textContent=settings.rate+'x';
  document.getElementById('set-auto-speak').value=settings.autoSpeak?'1':'0';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  settings.rate=parseFloat(document.getElementById('set-rate').value);
  settings.autoSpeak=document.getElementById('set-auto-speak').value==='1';
  saveS(); closeSettings();
}
document.getElementById('set-rate').addEventListener('input',function(){
  document.getElementById('set-rate-val').textContent=this.value+'x';
});
function resetProgress() {
  if(confirm('确定要重置所有学习进度吗？此操作不可恢复！')) {
    progress={}; save(); updateHome(); closeSettings(); showView('home');
  }
}

// ============ DATA EXPORT / IMPORT ============
function exportData() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    progress: progress,
    settings: settings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `gre-flashcard-backup-${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function triggerImport() {
  const input = document.getElementById('import-file');
  input.value = '';
  input.onchange = function() {
    if (this.files && this.files[0]) {
      importData(this.files[0]);
      this.value = '';
    }
  };
  input.click();
}

function setImportStatus(msg, color) {
  const el = document.getElementById('import-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--dim)';
}

function importData(file) {
  if (!file) { setImportStatus('未选择文件', 'var(--accent)'); return; }
  setImportStatus('⏳ 正在读取文件...', '#f5a623');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let data;
      if (file.name.endsWith('.md')) {
        data = parseObsidianNote(e.target.result);
      } else {
        data = JSON.parse(e.target.result);
      }
      if (!data.progress) { setImportStatus('❌ 文件格式错误：缺少 progress 字段', 'var(--accent)'); alert('文件格式错误，无法导入'); return; }
      const oldCount = Object.keys(progress).length;
      const newCount = Object.keys(data.progress || {}).length;
      if (confirm(`即将覆盖当前进度（${oldCount}条 → ${newCount}条），确定吗？`)) {
        progress = data.progress || {};
        settings = data.settings || settings;
        save(); saveS();
        updateHome(); closeSettings();
        setImportStatus('', '');
        setTimeout(() => alert(`✅ 导入成功！已恢复 ${newCount} 条学习进度`), 100);
      } else {
        setImportStatus('已取消导入', 'var(--dim)');
      }
    } catch(err) {
      setImportStatus('❌ 解析失败: ' + err.message, 'var(--accent)');
      alert('❌ 文件解析失败：' + err.message);
    }
  };
  reader.onerror = function() { setImportStatus('❌ 文件读取失败', 'var(--accent)'); };
  reader.readAsText(file);
}

// Parse Obsidian note format (JSON inside code block)
function parseObsidianNote(text) {
  const jsonMatch = text.match(/```(?:json)?\s*\n([\s\S]*?)\n```/);
  if (jsonMatch) return JSON.parse(jsonMatch[1]);
  return JSON.parse(text);
}

// Speak any word by text
function speakWord(wordText) {
  if (!wordText || wordText === '-') return;
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(wordText);
    u.lang = 'en-US'; u.rate = settings.rate; u.pitch = 1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
      || voices.find(v => v.lang === 'en-US')
      || voices.find(v => v.lang.startsWith('en'));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  }
}

// ============ KEYBOARD ============
document.addEventListener('keydown',function(e){
  if(document.getElementById('study').classList.contains('active')) {
    if(e.code==='Space'&&!defShown){e.preventDefault();showDef();}
    else if((e.key==='1'||e.code==='ArrowRight')&&defShown) rate(2);
    else if((e.key==='2'||e.code==='ArrowDown')&&defShown) rate(1);
    else if((e.key==='3'||e.code==='ArrowLeft')&&defShown) rate(0);
    else if(e.code==='KeyS') speak();
  }
  if(e.code==='Escape') {
    if(document.getElementById('settings-modal').classList.contains('open')) closeSettings();
    else if(!document.getElementById('home').classList.contains('active')) showView('home');
  }
});

// ============ INIT ============
load();
updateHome();
</script>
<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'gre-flashcard-v3';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(k => k.filter(k=>k!==CACHE).map(k=>caches.delete(k)))); });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request).then(r => r || caches.match('/'))));
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      if (e.request.url.includes('workers.dev') || e.request.url.includes('pages.dev')) return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          if (resp.ok && resp.type === 'basic') { const clone = resp.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); }
          return resp;
        }))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).then(reg => {
    console.log('✅ SW registered');
  }).catch(err => console.log('⚠️ SW failed:', err));
}
</script>
